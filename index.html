<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agendador de Mentoria</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="fw-bold">Agendador de Mentoria</h1>
        <p class="text-muted mb-0">
          Escolha um horário disponível
        </p>
      </div>

      <div class="d-flex align-items-center gap-3">
        <span id="user-name"></span>

        <button id="login-btn" class="btn btn-primary">
          Login Google
        </button>

        <button id="logout-btn" class="btn btn-outline-danger d-none">
          Sair
        </button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="calendar-head mb-4">
          <div>
            <p class="calendar-kicker mb-1">Calendário</p>
            <h2 class="calendar-title mb-1">Agenda da semana</h2>
            <p class="calendar-subtitle mb-0">
              <span id="current-date-label"></span>
              <span class="calendar-subtitle__sep">•</span>
              Visual limpo para acompanhar seus horários.
            </p>
          </div>

          <div class="calendar-legend">
            <span class="legend-chip legend-chip--available">Disponível</span>
            <span class="legend-chip legend-chip--booked">Agendado por você</span>
            <span class="legend-chip legend-chip--busy">Ocupado</span>
          </div>
        </div>

        <div id="slots-container" class="calendar-grid"></div>
        </div>
      </div>
    </div>

  </div>

  <div id="app-modal" class="app-modal d-none" role="dialog" aria-modal="true" aria-labelledby="app-modal-title" aria-describedby="app-modal-message">
    <div class="app-modal__backdrop" data-modal-close></div>
    <div class="app-modal__dialog">
      <div class="app-modal__header">
        <h2 id="app-modal-title">Aviso</h2>
        <button type="button" class="app-modal__close" data-modal-close aria-label="Fechar modal">&times;</button>
      </div>
      <p id="app-modal-message" class="app-modal__message"></p>
      <div class="app-modal__footer">
        <button type="button" class="btn btn-primary" data-modal-close>OK</button>
      </div>
    </div>
  </div>

  <div id="reschedule-modal" class="app-modal d-none" role="dialog" aria-modal="true" aria-labelledby="reschedule-title">
    <div class="app-modal__backdrop" data-reschedule-close></div>
    <div class="app-modal__dialog app-modal__dialog--reschedule">
      <div class="app-modal__header">
        <h2 id="reschedule-title">Remarcar mentoria</h2>
        <button type="button" class="app-modal__close" data-reschedule-close aria-label="Fechar modal">&times;</button>
      </div>

      <form id="reschedule-form" class="reschedule-form">
        <div class="reschedule-form__group">
          <label class="reschedule-form__label" for="reschedule-date">Dia</label>
          <select id="reschedule-date" class="form-select" required></select>
        </div>

        <div class="reschedule-form__group">
          <label class="reschedule-form__label" for="reschedule-hour">Horário</label>
          <select id="reschedule-hour" class="form-select" required></select>
        </div>

        <div class="reschedule-form__group">
          <label class="reschedule-form__label" for="reschedule-mentor">Mentor</label>
          <select id="reschedule-mentor" class="form-select" required></select>
        </div>

        <div class="app-modal__footer app-modal__footer--between">
          <button type="button" class="btn btn-outline-secondary" data-reschedule-close>Cancelar</button>
          <button type="submit" class="btn btn-primary">Confirmar remarcação</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
